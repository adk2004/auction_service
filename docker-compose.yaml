services:

  db:
    image: postgres:16
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: aksh
      POSTGRES_USER: aksh
      POSTGRES_DB: auction_db

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  redis:
    image: redis:7
    restart: always
    ports:
      - 6379:6379
    
  
volumes:
  pgdata: